# Site Settings
title: "Indonesian Expats Malaysia"
description: "Community directory for Indonesian expats in Malaysia - Jastip, Tuker Duit, Kargo, Sewa Mobil, Jobs, Visa Info"
baseurl: ""
url: "https://your-site.netlify.app"
repository: "your-username/your-repo"

# Build Settings
markdown: kramdown
permalink: pretty
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-paginate

# Custom Settings
paginate: 12
paginate_path: "/page:num/"
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - admin
  - netlify.toml

collections:
  contacts:
    output: true
    permalink: /contacts/:slug

defaults:
  - scope:
      path: ""
      type: contacts
    values:
      layout: contact
  - scope:
      path: ""
      type: posts
    values:
      layout: post

# SEO
twitter:
  username: indoexpatsmy
logo: "/assets/images/logo.png"

# Custom variables
theme_color: "#2A9134"
accent_color: "#FF6B35"