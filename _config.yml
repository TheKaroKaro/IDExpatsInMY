title: "Expat Contacts Directory"
description: "Curated directory of trusted contacts for expats"
baseurl: "/IDExpatsInMY"
url: "https://thekarokaro.github.io"

# Build settings
markdown: kramdown
permalink: pretty
timezone: Asia/Kuala_Lumpur

# Disqus Comments
disqus:
  shortname: "idexpatsinmy"
  enabled: false  # Set to true after you create Disqus account

# Collections
collections:
  contacts:
    output: true
    permalink: /directory/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "contacts"
    values:
      layout: "contact"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/
  - README.md