title: "Expat Contacts Directory"
description: "Curated directory of trusted contacts for expats"
baseurl: "/IDExpatsInMY"
url: "https://thekarokaro.github.io"

# Disqus Comments
disqus:
  shortname: "idexpatsinmy"
  enabled: true

# Build settings
markdown: kramdown
permalink: pretty

# Theme (removed minima since we have custom layout)
theme: null

# Collections
collections:
  contacts:
    output: true
    permalink: /directory/:name

# Site settings
email: "you@example.com"
telegram_bot_token: "" # Add your bot token here
telegram_chat_id: "" # Add your chat ID here

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "_contacts"
      type: "contacts"
    values:
      layout: "contact"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/
  - README.md