# Site Settings
title: "Indonesian Expats Malaysia"
description: "Community directory for Indonesian expats in Malaysia"
baseurl: "" # Keep empty for custom domain or username.github.io
url: "https://TheKaroKaro.github.io/IDExpatsInMY" # Your GitHub Pages URL

# GitHub Pages Requirements
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-paginate

# GitHub Pages specific
github: [metadata]

# Safe mode compatibility
safe: true

# Collections
collections:
  contacts:
    output: true
    permalink: /contacts/:slug

# Defaults
defaults:
  - scope:
      path: "contacts"
      type: "contacts"
    values:
      layout: "contact"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

#Add to include
include:
  - docs

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
  - admin
  - netlify.toml