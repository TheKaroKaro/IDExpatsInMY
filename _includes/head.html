<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>
    {% if page.title %}
        {{ page.title }} - {{ site.title }}
    {% else %}
        {{ site.title }} - {{ site.description }}
    {% endif %}
</title>
<meta name="description" content="{{ page.description | default: site.description }}">

<!-- ABSOLUTE CSS PATHS for GitHub Pages -->
<link rel="stylesheet" href="{{ '/assets/css/style.css' | absolute_url }}">
<link rel="stylesheet" href="{{ '/assets/css/form.css' | absolute_url }}">

<!-- Icons -->
<link rel="icon" href="{{ '/assets/images/favicon.png' | absolute_url }}">

<!-- SEO -->
{% seo %}

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
